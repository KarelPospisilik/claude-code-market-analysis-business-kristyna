<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analýza Trhu — Kreativní Workshopy ČR</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #E7F5F9; font-family: 'Barlow', Arial, sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    textarea::placeholder { color: #bbb; }
    textarea:focus { outline: none; }
    input:focus { outline: none; }
    button:focus { outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const PLP_BLUE   = "#0033A0";
    const RED_ACCENT = "#E4002B";
    const LIGHT_BG   = "#E7F5F9";
    const CARD_BG    = "#ffffff";
    const BORDER     = "#e0e0e0";
    const DARK_GRAY  = "#333333";
    const MID_GRAY   = "#888888";

    const SectionLabel = ({ num, text }) => (
      <div style={{
        display: "flex", alignItems: "center", gap: "10px",
        marginBottom: "20px", paddingBottom: "12px",
        borderBottom: `2px solid ${RED_ACCENT}`
      }}>
        <span style={{ color: RED_ACCENT, fontWeight: "700", fontSize: "13px", letterSpacing: "2px", fontFamily: "monospace" }}>
          {String(num).padStart(2, "0")} —
        </span>
        <span style={{ color: PLP_BLUE, fontWeight: "700", fontSize: "13px", letterSpacing: "2px", textTransform: "uppercase", fontFamily: "monospace" }}>
          {text}
        </span>
      </div>
    );

    const Tag = ({ text, color }) => (
      <span style={{
        display: "inline-block",
        background: color || RED_ACCENT,
        color: "white",
        fontSize: "10px", fontWeight: "700", letterSpacing: "1.5px",
        padding: "3px 8px", textTransform: "uppercase", fontFamily: "monospace",
        marginRight: "6px", marginBottom: "4px"
      }}>{text}</span>
    );

    const MetricCard = ({ label, value, sub, color }) => (
      <div style={{
        background: CARD_BG, border: `1px solid ${BORDER}`,
        borderTop: `3px solid ${color || PLP_BLUE}`,
        padding: "20px", flex: "1", minWidth: "140px"
      }}>
        <div style={{ fontSize: "10px", fontWeight: "700", letterSpacing: "2px", color: MID_GRAY, fontFamily: "monospace", textTransform: "uppercase", marginBottom: "10px" }}>{label}</div>
        <div style={{ fontSize: "26px", fontWeight: "900", color: color || PLP_BLUE, letterSpacing: "-1px" }}>{value}</div>
        {sub && <div style={{ fontSize: "10px", color: MID_GRAY, marginTop: "4px" }}>{sub}</div>}
      </div>
    );

    const CompetitorRow = ({ name, type, strengths, weaknesses, threat }) => {
      const threatColor = threat === "Vysoká" ? RED_ACCENT : threat === "Střední" ? "#f59e0b" : "#22c55e";
      return (
        <div style={{
          background: CARD_BG, border: `1px solid ${BORDER}`,
          padding: "16px 20px", marginBottom: "8px",
          borderLeft: `4px solid ${threatColor}`
        }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", flexWrap: "wrap", gap: "8px" }}>
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "8px" }}>
                <span style={{ fontSize: "12px", fontWeight: "700", color: PLP_BLUE, letterSpacing: "0.5px" }}>{name}</span>
                <Tag text={type} color={PLP_BLUE} />
                <span style={{ fontSize: "10px", fontWeight: "700", color: threatColor, fontFamily: "monospace", letterSpacing: "1px" }}>HROZBA: {threat}</span>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px" }}>
                <div>
                  <div style={{ fontSize: "10px", fontWeight: "700", color: "#22c55e", fontFamily: "monospace", letterSpacing: "1px", marginBottom: "4px" }}>✓ SILNÉ STRÁNKY</div>
                  <div style={{ fontSize: "11px", color: DARK_GRAY, lineHeight: "1.5" }}>{strengths}</div>
                </div>
                <div>
                  <div style={{ fontSize: "10px", fontWeight: "700", color: RED_ACCENT, fontFamily: "monospace", letterSpacing: "1px", marginBottom: "4px" }}>✗ SLABÉ STRÁNKY</div>
                  <div style={{ fontSize: "11px", color: DARK_GRAY, lineHeight: "1.5" }}>{weaknesses}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const RiskItem = ({ level, title, desc, mitigation }) => {
      const colors = { "KRITICKÉ": RED_ACCENT, "STŘEDNÍ": "#f59e0b", "NÍZKÉ": "#22c55e" };
      return (
        <div style={{ background: CARD_BG, border: `1px solid ${BORDER}`, borderLeft: `4px solid ${colors[level]}`, padding: "16px 20px", marginBottom: "8px" }}>
          <div style={{ display: "flex", gap: "10px", alignItems: "flex-start" }}>
            <Tag text={level} color={colors[level]} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: "12px", fontWeight: "700", color: PLP_BLUE, marginBottom: "4px" }}>{title}</div>
              <div style={{ fontSize: "11px", color: DARK_GRAY, marginBottom: "8px", lineHeight: "1.5" }}>{desc}</div>
              <div style={{ fontSize: "10px", color: MID_GRAY, fontFamily: "monospace", letterSpacing: "0.5px" }}>
                <span style={{ color: "#22c55e", fontWeight: "700" }}>MITIGACE: </span>{mitigation}
              </div>
            </div>
          </div>
        </div>
      );
    };

    const tabs = ["Přehled trhu", "Konkurence", "Cenotvorba", "Mezera & Příležitost"];

    function MarketAnalysis() {
      const [activeTab, setActiveTab] = useState(0);

      return (
        <div style={{ minHeight: "100vh", background: LIGHT_BG, fontFamily: "'Barlow', Arial, sans-serif" }}>
          {/* Navbar */}
          <div style={{ background: PLP_BLUE, padding: "0 32px", display: "flex", alignItems: "center", justifyContent: "space-between", height: "52px", borderBottom: "3px solid rgba(255,255,255,0.3)" }}>
            <h1 style={{ margin: 0, fontSize: "20px", fontWeight: "900", color: "white", letterSpacing: "-0.5px", textTransform: "uppercase" }}>
              ANALÝZA <span style={{ color: "white", opacity: 0.75 }}>TRHU</span>
            </h1>
            <div style={{ border: "1.5px solid rgba(255,255,255,0.5)", padding: "4px 10px", color: "white", fontSize: "10px", fontWeight: "700", letterSpacing: "2px", fontFamily: "monospace" }}>
              Podnikání Kristýna
            </div>
          </div>

          <div style={{ maxWidth: "960px", margin: "0 auto", padding: "32px 24px 60px" }}>
            {/* Subtitle */}
            <div style={{ marginBottom: "28px" }}>
              <div style={{ fontSize: "11px", color: MID_GRAY, marginBottom: "6px" }}>Strategická analýza · B2B kreativní workshopy · Česká republika · 2025</div>
              <div style={{ fontSize: "15px", fontWeight: "700", color: DARK_GRAY }}>Trh firemních kreativních workshopů — příležitost pro kurátorský marketplace</div>
            </div>

            {/* Tab navigation */}
            <div style={{ display: "flex", flexWrap: "wrap", gap: "4px", marginBottom: "28px" }}>
              {tabs.map((tab, i) => (
                <button key={i} onClick={() => setActiveTab(i)} style={{
                  padding: "9px 16px", border: "none", cursor: "pointer",
                  background: activeTab === i ? PLP_BLUE : CARD_BG,
                  color: activeTab === i ? "white" : MID_GRAY,
                  fontWeight: "700", fontSize: "11px", fontFamily: "inherit",
                  letterSpacing: "0.5px",
                  borderBottom: activeTab === i ? `3px solid ${RED_ACCENT}` : `3px solid transparent`,
                  transition: "all 0.15s"
                }}
                  onMouseEnter={e => { if (activeTab !== i) { e.currentTarget.style.background = "#f0f0f0"; e.currentTarget.style.color = PLP_BLUE; } }}
                  onMouseLeave={e => { if (activeTab !== i) { e.currentTarget.style.background = CARD_BG; e.currentTarget.style.color = MID_GRAY; } }}
                >{tab}</button>
              ))}
            </div>

            {/* TAB 0: Přehled trhu */}
            {activeTab === 0 && (
              <div style={{ animation: "fadeUp 0.35s ease" }}>
                <SectionLabel num={1} text="Velikost a charakter trhu" />
                <div style={{ display: "flex", gap: "16px", flexWrap: "wrap", marginBottom: "28px" }}>
                  <MetricCard label="Odhadovaný trh ČR (teambuilding)" value="2–4 mld" sub="Kč ročně (celkový teambuilding trh)" color={PLP_BLUE} />
                  <MetricCard label="Kreativní segment" value="~15–20 %" sub="Podíl kreativních workshopů z celku" color="#7c3aed" />
                  <MetricCard label="Průměrná útrata na osobu" value="800–2 500" sub="Kč za kreativní workshop B2B" color="#0891b2" />
                  <MetricCard label="Sezónní špičky" value="4× ročně" sub="Vánoce, jaro, léto, konec roku" color={RED_ACCENT} />
                </div>
                <div style={{ background: CARD_BG, border: `1px solid ${BORDER}`, padding: "24px", marginBottom: "24px" }}>
                  <div style={{ fontSize: "12px", fontWeight: "700", color: PLP_BLUE, letterSpacing: "1px", textTransform: "uppercase", marginBottom: "16px" }}>Struktura trhu</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px" }}>
                    <div>
                      <div style={{ fontSize: "10px", fontWeight: "700", color: MID_GRAY, fontFamily: "monospace", letterSpacing: "2px", marginBottom: "12px", textTransform: "uppercase" }}>Co trh dnes nabízí</div>
                      {[
                        "Outdoorové aktivity (lanáče, rafty)",
                        "Gastronomické workshopy (vaření, barmanství)",
                        "Únikové hry",
                        "Sportovní teambuilding",
                        "Generické kreativní dílny (malování, keramika)",
                      ].map((item, i) => (
                        <div key={i} style={{ fontSize: "11px", color: DARK_GRAY, padding: "6px 0", borderBottom: `1px solid ${BORDER}`, display: "flex", gap: "8px" }}>
                          <span style={{ color: MID_GRAY }}>→</span> {item}
                        </div>
                      ))}
                    </div>
                    <div>
                      <div style={{ fontSize: "10px", fontWeight: "700", color: MID_GRAY, fontFamily: "monospace", letterSpacing: "2px", marginBottom: "12px", textTransform: "uppercase" }}>Co trhu chybí (příležitost)</div>
                      {[
                        "Kurátorský výběr — ne každý lektor je kvalitní",
                        "Jeden kontaktní bod místo hledání jednotlivců",
                        "Profily umělců s portfoliem a recenzemi",
                        "Transparentní cenotvorba, snadná poptávka",
                        "Zaměření na umělecký zážitek (ne sport/jídlo)",
                      ].map((item, i) => (
                        <div key={i} style={{ fontSize: "11px", color: DARK_GRAY, padding: "6px 0", borderBottom: `1px solid ${BORDER}`, display: "flex", gap: "8px" }}>
                          <span style={{ color: "#22c55e", fontWeight: "700" }}>✓</span> {item}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
                <div style={{ background: CARD_BG, border: `1px solid ${BORDER}`, borderTop: `3px solid ${RED_ACCENT}`, padding: "24px", marginBottom: "24px" }}>
                  <div style={{ fontSize: "12px", fontWeight: "700", color: PLP_BLUE, letterSpacing: "1px", textTransform: "uppercase", marginBottom: "16px" }}>Tržní trendy 2024–2025</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "16px" }}>
                    {[
                      { trend: "↑ Indoor aktivity", note: "Poptávka po aktivitách nezávislých na počasí výrazně roste — firmy preferují jistotu zážitku" },
                      { trend: "↑ Zážitek = benefit", note: "HR oddělení stále více vnímají kreativní workshopy jako employee benefit, ne jen zábavu" },
                      { trend: "↑ Přímý přístup k umělcům", note: "Firmy chtějí autentické lektory s příběhem, ne anonymní agentury bez tváře" },
                      { trend: "↑ Vánoční sezona klíčová", note: "Listopad–prosinec tvoří 30–40 % ročního obratu v segmentu firemních workshopů" },
                      { trend: "↑ On-line booking", note: "Firmy stále více poptávají možnost objednání on-line bez nutnosti volání a e-mailů" },
                      { trend: "↑ Kurátorství jako hodnota", note: "Přeplněný trh vytváří potřebu filtrování — kdo vybere za mě spolehlivého umělce?" },
                    ].map((item, i) => (
                      <div key={i} style={{ background: LIGHT_BG, padding: "14px", border: `1px solid ${BORDER}` }}>
                        <div style={{ fontSize: "11px", fontWeight: "700", color: PLP_BLUE, marginBottom: "6px" }}>{item.trend}</div>
                        <div style={{ fontSize: "10px", color: MID_GRAY, lineHeight: "1.5" }}>{item.note}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* TAB 1: Konkurence */}
            {activeTab === 1 && (
              <div style={{ animation: "fadeUp 0.35s ease" }}>
                <SectionLabel num={2} text="Mapa konkurence" />
                <div style={{ marginBottom: "20px" }}>
                  <div style={{ fontSize: "11px", color: MID_GRAY, marginBottom: "16px" }}>Rozdělení hráčů do 4 kategorií podle přístupu a cílového segmentu.</div>

                  <div style={{ marginBottom: "8px" }}>
                    <div style={{ fontSize: "10px", fontWeight: "700", color: MID_GRAY, fontFamily: "monospace", letterSpacing: "2px", padding: "6px 12px", background: LIGHT_BG, borderLeft: `3px solid ${PLP_BLUE}`, marginBottom: "4px" }}>KATEGORIE A — VELKÉ EVENTOVÉ AGENTURY</div>
                    <CompetitorRow name="Z-Agency" type="Agentura" threat="Střední"
                      strengths="Velké portfolio, outdoorové programy, silná reference (Generali, ČP, Semrush)"
                      weaknesses="Žádný fokus na uměleckou kvalitu, neosobní přístup, cenově dražší" />
                    <CompetitorRow name="ProBull Teambuilding" type="Agentura" threat="Střední"
                      strengths="Full-service, zajistí místo + program + catering, zkušený tým"
                      weaknesses="Kreativní workshopy jsou jen okrajová část portfolia, není to jejich core" />
                    <CompetitorRow name="Show Must Go On" type="Agentura" threat="Nízká"
                      strengths="Originální programy, vlastní lektoři, reference (FujiFilm, Coca-Cola)"
                      weaknesses="Zaměřena na soutěžní programy a hry, ne na umělecké workshopy" />
                  </div>

                  <div style={{ marginBottom: "8px" }}>
                    <div style={{ fontSize: "10px", fontWeight: "700", color: MID_GRAY, fontFamily: "monospace", letterSpacing: "2px", padding: "6px 12px", background: LIGHT_BG, borderLeft: `3px solid ${RED_ACCENT}`, marginBottom: "4px" }}>KATEGORIE B — ART TEAMBUILDING (přímá konkurence)</div>
                    <CompetitorRow name="ArtMoment (artmoment.cz)" type="Art teambuilding" threat="Vysoká"
                      strengths="Malování, keramika, mechária — celá ČR (Praha, Brno, Ostrava, Plzeň), reference DHL, IBM, Ernst & Young, fakturuje jako školení, přijede kamkoliv"
                      weaknesses="Single-brand provider — jeden tým lektorů, jeden styl. Žádný marketplace, firma si nevybírá umělce jako osobnost" />
                    <CompetitorRow name="Malovanikresleni.cz" type="Art ateliér B2B" threat="Střední"
                      strengths="900+ klientů ročně, bohaté portfolio technik (malba, mozaika, graffiti, kaligrafie), reference Swarovski, Skanska, eBay, Mondi, akademičtí malíři"
                      weaknesses="Praha/Brno, zastaralý web, žádná on-line platforma ani booking, vše přes e-mail/telefon" />
                    <CompetitorRow name="DílnaNaKolech.cz" type="Mobilní craft dílny" threat="Nízká"
                      strengths="Plně mobilní (přijedou kamkoliv se vším), craft diverzita (dřevo, čokoláda, pyrogravura), vhodné i pro venkovní akce"
                      weaknesses="Craft/řemeslo zaměření — ne umělecký zážitek, chybí umělecký příběh a kurace, nízký prémiový potenciál" />
                    <CompetitorRow name="Divadlo Procity" type="Kreativní rozvoj" threat="Nízká"
                      strengths="Unikátní niche — divadelní improvizace, herecké techniky jako teambuilding, rozvoj prezentačních dovedností"
                      weaknesses="Velmi specifický segment (6–20 os.), nesoutěží přímo s výtvarným workshopem, jiný zákaznický profil" />
                  </div>

                  <div style={{ marginBottom: "8px" }}>
                    <div style={{ fontSize: "10px", fontWeight: "700", color: MID_GRAY, fontFamily: "monospace", letterSpacing: "2px", padding: "6px 12px", background: LIGHT_BG, borderLeft: `3px solid #7c3aed`, marginBottom: "4px" }}>KATEGORIE C — PLATFORMY A MARKETPLACE</div>
                    <CompetitorRow name="Eventino.cz" type="Platforma míst" threat="Nízká"
                      strengths="On-line booking, mapa míst po ČR, hodnocení, auditovaní dodavatelé"
                      weaknesses="Zaměřena na místa, ne na lektory/umělce — není to marketplace workshopů" />
                    <CompetitorRow name="SkvěléČesko.cz" type="Zážitkový katalog" threat="Nízká"
                      strengths="On-line rezervace, garance ceny, mnoho různých kategorií"
                      weaknesses="Generický katalog zážitků (bowling, laser game, golf), kreativní workshopy nejsou fokus" />
                  </div>

                  <div style={{ marginBottom: "16px" }}>
                    <div style={{ fontSize: "10px", fontWeight: "700", color: MID_GRAY, fontFamily: "monospace", letterSpacing: "2px", padding: "6px 12px", background: LIGHT_BG, borderLeft: `3px solid #22c55e`, marginBottom: "4px" }}>KATEGORIE D — ZAHRANIČNÍ BENCHMARK</div>
                    <CompetitorRow name="ClassBento (US/UK/AU)" type="Marketplace" threat="Nízká (není v ČR)"
                      strengths="Nejrychleji rostoucí marketplace kreativních zážitků, 17–20% provize, vlastní booking widget, B2B i B2C, v prosinci 2024 akvizice Obby (UK)"
                      weaknesses="Není lokalizován pro ČR, nerozumí lokálnímu trhu a umělecké scéně" />
                    <CompetitorRow name="Konfetti (Berlín)" type="Marketplace" threat="Střední"
                      strengths="Přesný model jako váš — on-line booking kreativních workshopů, B2B teambuilding focus, DE/AT trh"
                      weaknesses="Německý trh, zatím bez české expanze — ale pozor, mohou přijít" />
                  </div>

                </div>
              </div>
            )}

            {/* TAB 2: Cenotvorba */}
            {activeTab === 2 && (
              <div style={{ animation: "fadeUp 0.35s ease" }}>
                <SectionLabel num={3} text="Benchmarking cen na českém trhu" />
                <div style={{ background: CARD_BG, border: `1px solid ${BORDER}`, padding: "24px", marginBottom: "24px" }}>
                  <div style={{ fontSize: "12px", fontWeight: "700", color: PLP_BLUE, letterSpacing: "1px", textTransform: "uppercase", marginBottom: "16px" }}>Přehled tržních cen kreativních workshopů (B2B, Praha)</div>
                  <div style={{ overflowX: "auto" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "11px" }}>
                      <thead>
                        <tr style={{ background: PLP_BLUE }}>
                          {["Typ workshopu", "Cena / os. (bez DPH)", "Délka", "Min. skupina", "Formát", "Hráč"].map(h => (
                            <th key={h} style={{ padding: "10px 12px", color: "white", fontWeight: "700", fontSize: "10px", letterSpacing: "1px", textTransform: "uppercase", textAlign: "left", fontFamily: "monospace" }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {[
                          ["Korálkování / macramé", "400–700 Kč", "2–3 hod.", "8 os.", "Mobile", "Manumi"],
                          ["Výroba svíček / mýdel", "600–900 Kč", "2–3 hod.", "8 os.", "Mobile/ateliér", "Manumi"],
                          ["Malování (akryl / akvarel)", "700–1 200 Kč", "2–3 hod.", "10 os.", "Ateliér/mobile", "ArtMoment"],
                          ["Graffiti workshop", "900–1 500 Kč", "3 hod.", "10 os.", "Venku/ateliér", "MalováníKreslení"],
                          ["Keramika / točení", "1 000–1 800 Kč", "3–4 hod.", "8 os.", "Ateliér", "Různí"],
                          ["Dřevěné logo (pyrogravura)", "800–1 400 Kč", "2–3 hod.", "10 os.", "Mobile", "DílnaNaKolech"],
                          ["Mozaika / kolektivní obraz", "1 200–2 200 Kč", "3–4 hod.", "15 os.", "Mobile", "MalováníKreslení"],
                          ["Prémiový art workshop (kurátorský)", "1 800–3 500 Kč", "3–4 hod.", "10–20 os.", "", ""],
                        ].map((row, i) => (
                          <tr key={i} style={{ background: i === 7 ? "#fff3e0" : i % 2 === 0 ? CARD_BG : LIGHT_BG, fontWeight: i === 7 ? "700" : "400" }}>
                            {row.map((cell, j) => (
                              <td key={j} style={{ padding: "10px 12px", color: i === 7 && j === 0 ? RED_ACCENT : DARK_GRAY, borderBottom: `1px solid ${BORDER}` }}>{cell}</td>
                            ))}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* TAB 3: Mezera a Příležitost */}
            {activeTab === 3 && (
              <div style={{ animation: "fadeUp 0.35s ease" }}>
                <SectionLabel num={4} text="Tržní mezera a positioning" />
                <div style={{ background: CARD_BG, border: `1px solid ${BORDER}`, borderTop: `3px solid ${PLP_BLUE}`, padding: "24px", marginBottom: "24px" }}>
                  <div style={{ fontSize: "12px", fontWeight: "700", color: PLP_BLUE, marginBottom: "16px" }}>Positioning mapa — kde vy stojíte</div>
                  <div style={{ position: "relative", width: "100%", height: "320px", background: LIGHT_BG, border: `1px solid ${BORDER}` }}>
                    <div style={{ position: "absolute", top: "50%", left: 0, right: 0, height: "1px", background: BORDER }} />
                    <div style={{ position: "absolute", left: "50%", top: 0, bottom: 0, width: "1px", background: BORDER }} />
